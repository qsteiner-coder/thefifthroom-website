    {screenItems.filter(i=>i.mt==="area").map(rI)}

    {selItScr&&selItScr.mt!=="area"&&<Dims it={selItScr} sx={selItScr._sx} sy={selItScr._sy} sw={selItScr._sw} sh={selItScr._sh} sc={sc} items={screenItems} spW={gW} spH={gD} isWall={false}/>}
  </div></div>);
}

function WallCV({items,wW,wH,sc,sel,onSel,onDrag,nm,onTap}){
  const dr=useRef(null);const[lp,sLP]=useState({});const[gs,sGS]=useState([]);const pW=wW*sc,pH=wH*sc;
  const toS=(it)=>{const x2=lp[it.id]?.x??it.x;const z2=lp[it.id]?.z??it.z;return{sx:x2*sc,sy:(wH-z2-it.h)*sc,sw:it.w*sc,sh:it.h*sc};};
  const onPD=(e,id)=>{e.preventDefault();e.stopPropagation();const it=items.find(i=>i.id===id);if(!it||it.locked){onSel(id);return;}const cx=e.clientX??e.touches?.[0]?.clientX;const cy=e.clientY??e.touches?.[0]?.clientY;const pr=toS(it);dr.current={id,scx:cx,scy:cy,ssx:pr.sx,ssy:pr.sy,iw:it.w,ih:it.h,mv:false};onSel(id);};
  const onPM=useCallback(e=>{if(!dr.current)return;const cx=e.clientX??e.touches?.[0]?.clientX;const cy=e.clientY??e.touches?.[0]?.clientY;const d=dr.current;if(Math.abs(cx-d.scx)>3||Math.abs(cy-d.scy)>3)d.mv=true;if(!d.mv)return;const rSX=d.ssx+cx-d.scx;const rSY=d.ssy+cy-d.scy;const rCX=rSX/sc+d.iw/2;const rCZ=wH-d.ih-rSY/sc+d.ih/2;const oth=items.filter(i=>i.id!==d.id).map(i=>({cx:i.x+i.w/2,cy:i.z+i.h/2,l:i.x,r:i.x+i.w,t:i.z,b:i.z+i.h,lb:i.lb}));const{sx:snX,sy:snZ,gs:g}=doSnap(rCX,rCZ,d.iw,d.ih,wW,wH,oth);sLP(p=>({...p,[d.id]:{x:_clamp(snX-d.iw/2,0,wW-d.iw),z:_clamp(snZ-d.ih/2,0,wH-d.ih)}}));sGS(g);},[sc,wW,wH,items]);
  const onPU=useCallback(()=>{if(!dr.current)return;const d=dr.current;const p=lp[d.id];if(d.mv&&p)onDrag(d.id,{x:p.x,z:p.z});else if(!d.mv&&onTap)onTap(d.id);sLP(p2=>{const n={...p2};delete n[d.id];return n;});sGS([]);dr.current=null;},[lp,onDrag,onTap]);
  useEffect(()=>{window.addEventListener("mousemove",onPM);window.addEventListener("mouseup",onPU);window.addEventListener("touchmove",onPM,{passive:false});window.addEventListener("touchend",onPU);return()=>{window.removeEventListener("mousemove",onPM);window.removeEventListener("mouseup",onPU);window.removeEventListener("touchmove",onPM);window.removeEventListener("touchend",onPU);};},[onPM,onPU]);
  const screenItems=items.map(it=>{const{sx,sy,sw,sh}=toS(it);return{...it,_sx:sx,_sy:sy,_sw:sw,_sh:sh};});
  const selItScr=screenItems.find(i=>i.id===sel);
  const rI=(scIt)=>{const s=scIt.id===sel;
    const shelfCount=scIt.shelves||0;
    return(<div key={scIt.id} onMouseDown={e=>onPD(e,scIt.id)} onTouchStart={e=>{e.stopPropagation();onPD(e,scIt.id);}} onClick={e=>{e.stopPropagation();onSel(scIt.id);}}
      style={{position:"absolute",left:scIt._sx,top:scIt._sy,width:Math.max(scIt._sw,8),height:Math.max(scIt._sh,8),background:scIt.cl+"44",border:`${s?2.5:1}px solid ${scIt.cl}${s?"":"88"}`,borderRadius:4,cursor:scIt.locked?"default":"move",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden",zIndex:s?20:5,touchAction:"none",userSelect:"none",boxShadow:s?`0 0 0 3px ${scIt.cl}44`:"none"}}>
      {scIt.sh&&scIt._sh>10&&Array.from({length:Math.max(2,Math.round(scIt._sh/8))},(_,i2)=>(<div key={i2} style={{position:"absolute",left:0,right:0,top:i2*(scIt._sh/Math.max(2,Math.round(scIt._sh/8))),height:1,background:scIt.cl+"66",pointerEvents:"none"}}/>))}
      {shelfCount>0&&Array.from({length:shelfCount},(_,si)=>{const tierY=scIt._sh*((si+1)/(shelfCount+1));return(<div key={"st"+si} style={{position:"absolute",left:0,right:0,top:tierY,height:2,background:scIt.cl,pointerEvents:"none",opacity:0.7}}/>);})
      }
      <div style={{fontSize:Math.max(8,Math.min(18,scIt._sh*.28)),lineHeight:1,zIndex:1}}>{scIt.ic}</div>
      {scIt._sh>18&&<div style={{fontSize:Math.max(6,Math.min(10,scIt._sw/Math.max(scIt.lb.length,1)*1.1)),color:DC.tx,fontWeight:600,textAlign:"center",lineHeight:1.2,zIndex:1,maxWidth:"100%",overflow:"hidden"}}>{scIt.lb}</div>}
      {shelfCount>0&&<div style={{position:"absolute",bottom:1,right:3,fontSize:8,color:DC.gd,fontWeight:700,zIndex:2}}>{shelfCount}T</div>}
    </div>);};
  return(<div style={{position:"relative",display:"inline-block"}}><div style={{position:"relative",width:pW,height:pH,background:DC.bg,border:"2px solid #64748b",userSelect:"none"}}>
    {Array.from({length:Math.floor(wW)+1},(_,i)=>(<div key={"gx"+i} style={{position:"absolute",top:0,left:i*sc,width:1,height:"100%",background:i%5===0?"#2e3a52":DC.bd,opacity:i%5===0?1:.4,pointerEvents:"none"}}/>))}
    {Array.from({length:Math.floor(wH)+1},(_,i)=>(<div key={"gy"+i} style={{position:"absolute",left:0,top:i*sc,height:1,width:"100%",background:i%5===0?"#2e3a52":DC.bd,opacity:i%5===0?1:.4,pointerEvents:"none"}}/>))}
    {Array.from({length:Math.floor(wH/2)+1},(_,i)=>(<div key={"lh"+i} style={{position:"absolute",right:4,top:(wH-i*2)*sc-10,fontSize:9,color:DC.mt+"66",pointerEvents:"none"}}>{i*2}'</div>))}

/* ── Isometric 3D — Pure SVG projection with view presets ──────────────── */
function IsoCV({items,gW,gD,gH,sc,sel,onSel}){
  const[view,setView]=useState("corner");
  const s=sc*0.45;

  // Each view remaps world (x,y) so a different corner faces the viewer.
  // The iso projection always shows the back-left corner, so we rotate the world.
  const isLR=view==="left"||view==="right";
  const eW=isLR?gD:gW, eD=isLR?gW:gD; // effective floor dims after rotation

  const remapPt=(wx,wy)=>{
    switch(view){
      case"front": return[gW-wx,gD-wy];
      case"left":  return[gD-wy,wx];
      case"right": return[wy,gW-wx];
      default:     return[wx,wy]; // corner & back
    }
  };

  const iso=(rx,ry,z)=>({
    px:(rx-ry)*s*0.866,
    py:(rx+ry)*s*0.5-z*s
  });

  // Canvas sizing
  const allC=[[0,0,0],[eW,0,0],[0,eD,0],[eW,eD,0],[0,0,gH],[eW,0,gH],[0,eD,gH],[eW,eD,gH]];
  const proj=allC.map(([x,y,z])=>iso(x,y,z));
  const minPx=Math.min(...proj.map(q=>q.px))-30, maxPx=Math.max(...proj.map(q=>q.px))+30;
  const minPy=Math.min(...proj.map(q=>q.py))-30, maxPy=Math.max(...proj.map(q=>q.py))+40;
  const svgW=maxPx-minPx, svgH=maxPy-minPy, ox=-minPx, oy=-minPy;

  const p=(rx,ry,z)=>{const{px,py}=iso(rx,ry,z);return[px+ox,py+oy];};
  const pts=arr=>arr.map(v=>v[0]+","+v[1]).join(" ");

  // Grid
  const gridLines=[];
  for(let i=0;i<=eW;i+=2)gridLines.push(<line key={"gx"+i} x1={p(i,0,0)[0]} y1={p(i,0,0)[1]} x2={p(i,eD,0)[0]} y2={p(i,eD,0)[1]} stroke={i%5===0?"#2a3548":"#1a2030"} strokeWidth={i%5===0?0.8:0.4}/>);
  for(let i=0;i<=eD;i+=2)gridLines.push(<line key={"gy"+i} x1={p(0,i,0)[0]} y1={p(0,i,0)[1]} x2={p(eW,i,0)[0]} y2={p(eW,i,0)[1]} stroke={i%5===0?"#2a3548":"#1a2030"} strokeWidth={i%5===0?0.8:0.4}/>);

  const floorPoly=pts([p(0,0,0),p(eW,0,0),p(eW,eD,0),p(0,eD,0)]);
  const backWall=pts([p(0,0,0),p(eW,0,0),p(eW,0,gH),p(0,0,gH)]);
  const leftWall=pts([p(0,0,0),p(0,eD,0),p(0,eD,gH),p(0,0,gH)]);

  // Wall labels per view
  const labels={corner:["BACK","LEFT"],front:["FRONT","RIGHT"],back:["BACK","LEFT"],left:["LEFT","BACK"],right:["RIGHT","FRONT"]};
  const[lbBack,lbLeft]=labels[view];

  // Sort: painter's algorithm based on remapped coords
  const sorted=[...items].sort((a,b)=>{
    const[rxa,rya]=remapPt(a.x+a.w/2,a.y+a.d/2);
    const[rxb,ryb]=remapPt(b.x+b.w/2,b.y+b.d/2);
    return(rxa+rya)-(rxb+ryb);
  });

  const shade=(hex,factor)=>{
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    const f=v=>Math.min(255,Math.max(0,Math.round(v*factor)));
    return"#"+[f(r),f(g),f(b)].map(v=>v.toString(16).padStart(2,"0")).join("");
  };

  const renderBox=(it)=>{
    const{x,y,z,h,cl,ic,lb,id:iid}=it;
    const isA=it.mt==="area";
    const isSel=iid===sel;
    const minVis=0.5;
    const rw=Math.max(it.w,minVis),rd=Math.max(it.d,minVis);

    // Remap the 4 floor corners
    const c00=remapPt(x,y),c10=remapPt(x+rw,y),c01=remapPt(x,y+rd),c11=remapPt(x+rw,y+rd);

    if(isA){
      const c00a=remapPt(x,y),c10a=remapPt(x+it.w,y),c01a=remapPt(x,y+it.d),c11a=remapPt(x+it.w,y+it.d);
      return(<polygon key={iid} points={pts([p(...c00a,0),p(...c10a,0),p(...c11a,0),p(...c01a,0)])} fill={cl+"22"} stroke={cl+"44"} strokeWidth={1} style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();onSel(iid);}}/>);
    }

    const topF=pts([p(...c00,z+h),p(...c10,z+h),p(...c11,z+h),p(...c01,z+h)]);
    const f1=pts([p(...c10,z),p(...c10,z+h),p(...c11,z+h),p(...c11,z)]);
    const f2=pts([p(...c01,z),p(...c11,z),p(...c11,z+h),p(...c01,z+h)]);
    const f3=pts([p(...c00,z),p(...c00,z+h),p(...c01,z+h),p(...c01,z)]);
    const f4=pts([p(...c00,z),p(...c10,z),p(...c10,z+h),p(...c00,z+h)]);

    const topC=shade(cl,1.2),f1C=shade(cl,0.7),f2C=shade(cl,0.85),f3C=shade(cl,0.75),f4C=shade(cl,0.6);
    const stk=isSel?"#fff":"rgba(0,0,0,0.3)",stkW=isSel?2:0.5;
    const tc=p(...remapPt(x+rw/2,y+rd/2),z+h);

    const shelfCount=it.shelves||0;
    const shelfPolys=[];
    for(let si=1;si<=shelfCount;si++){
      const sz=z+h*(si/(shelfCount+1));
      shelfPolys.push(<polygon key={"sh"+si} points={pts([p(...c00,sz),p(...c10,sz),p(...c11,sz),p(...c01,sz)])} fill={shade(cl,1.0)+"88"} stroke={cl} strokeWidth={0.5}/>);
    }

    return(<g key={iid} style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();onSel(iid);}}>
      <polygon points={f4} fill={f4C} stroke={stk} strokeWidth={stkW}/>
      <polygon points={f3} fill={f3C} stroke={stk} strokeWidth={stkW}/>
      <polygon points={f1} fill={f1C} stroke={stk} strokeWidth={stkW}/>
      <polygon points={f2} fill={f2C} stroke={stk} strokeWidth={stkW}/>
      <polygon points={topF} fill={topC} stroke={stk} strokeWidth={stkW}/>
      {shelfPolys}
      {isSel&&<polygon points={topF} fill="none" stroke="#fff" strokeWidth={2.5}/>}
      <text x={tc[0]} y={tc[1]-2} textAnchor="middle" fill="#fff" fontSize={Math.max(7,Math.min(12,Math.max(rw,rd)*s*0.12))} fontWeight="700" fontFamily="DM Sans,sans-serif" style={{textShadow:"0 1px 3px #000",pointerEvents:"none"}}>{ic}</text>
      {Math.max(rw,rd)*s>25&&<text x={tc[0]} y={tc[1]+9} textAnchor="middle" fill="#ffffffcc" fontSize={Math.max(6,Math.min(9,Math.max(rw,rd)*s*0.08))} fontWeight="600" fontFamily="DM Sans,sans-serif" style={{textShadow:"0 1px 2px #000",pointerEvents:"none"}}>{lb}</text>}
    </g>);
  };

  return(
    <div style={{display:"inline-block"}}>
      <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
        {["corner","front","back","left","right"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{..._bS(view===v?DC.gd+"33":DC.cd,view===v?DC.gd:DC.mt),padding:"5px 14px",fontSize:11,border:"1px solid "+(view===v?DC.gd+"66":DC.bd),textTransform:"capitalize"}}>{v}</button>
        ))}
      </div>
      <svg width={svgW} height={svgH} xmlns="http://www.w3.org/2000/svg" style={{background:"transparent"}}>
        <polygon points={backWall} fill="#151a25" stroke="#334155" strokeWidth={1} opacity={0.6}/>
        <polygon points={leftWall} fill="#111722" stroke="#334155" strokeWidth={1} opacity={0.6}/>
        <polygon points={floorPoly} fill={DC.bg} stroke={DC.gd+"66"} strokeWidth={1.5}/>
        {gridLines}
        <text x={p(eW/2,0,0)[0]} y={p(eW/2,0,0)[1]-6} textAnchor="middle" fill={DC.gd} fontSize={10} fontWeight={700} fontFamily="DM Sans">{lbBack}</text>
        <text x={p(0,eD/2,0)[0]-10} y={p(0,eD/2,0)[1]} textAnchor="middle" fill={DC.mt} fontSize={9} fontFamily="DM Sans">{lbLeft}</text>
        {sorted.map(renderBox)}
      </svg>
    </div>
  );
}

/* ── Inspector ──────────────────────────────────────────────────────────── */

    {/* Shelf tier control — for freestanding shelves, overhead racks, etc. */}
    {(it.defId==="free-shelf"||it.defId==="overhead"||it.shelves>0)&&<div style={{marginBottom:10}}>

/* ── AI Design Assistant ────────────────────────────────────────────────── */
const CATALOG_COMPACT = DCAT.map(c => c.id+"|"+c.lb+"|"+c.mt+"|w"+c.w+"d"+c.d+"h"+c.h+"|dZ"+c.dZ).join(";");

function AIPanel({gW,gD,gH,items,onApplyAI,showToast}){
  const[prompt,setPrompt]=useState("");const[loading,setLoading]=useState(false);const[preview,setPreview]=useState(null);const[error,setError]=useState(null);
  const generateDesign=async()=>{
    if(!prompt.trim())return;setLoading(true);setError(null);setPreview(null);
    const sysMsg="You are a precise garage layout tool. Garage: "+gW+"x"+gD+"ft, "+gH+"ft ceiling. y=0 is the BACK wall, y="+gD+" is the FRONT (garage doors).\nCatalog (id|label|mount|size|defaultZ): "+CATALOG_COMPACT+"\nCRITICAL RULES:\n1. ONLY place items the user explicitly asks for. Never add extras.\n2. Wall-mounted items (slatwall, shelves, pegboard, mirrors, upper cabinets): place FLAT against the wall. Back wall: y=0. Front wall: y="+(gD-1)+". Left wall: x=0. Right wall: x="+(gW-1)+". Use the item default dZ for z height.\n3. Floor items: z=0. Leave 3ft clearance between items and from walls.\n4. Garage doors go on the front wall (y="+(gD-0.5)+").\n5. Spread items along walls, dont stack at the same position.\n6. Use catalog default sizes. Do NOT set rot unless the user says to rotate.\nRespond ONLY with valid JSON, no markdown:\n{\"description\":\"brief summary\",\"items\":[{\"defId\":\"catalog_id\",\"x\":0,\"y\":0,\"z\":0}]}";
    try{
      const response=await fetch("/api/anthropic",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4096,system:sysMsg,messages:[{role:"user",content:prompt}]})});
      if(!response.ok){const errData=await response.json().catch(()=>null);throw new Error(errData&&errData.error?errData.error.message:"API error "+response.status);}
      const data=await response.json();const text=data.content.map(b=>b.text||"").join("");const clean=text.replace(/```json/g,"").replace(/```/g,"").trim();
      let parsed;
      try{parsed=JSON.parse(clean);}catch(parseErr){
        let salvaged=clean;const lastBrace=salvaged.lastIndexOf("}");
        if(lastBrace>0){salvaged=salvaged.substring(0,lastBrace+1);if(!salvaged.endsWith("]}"))salvaged+="]}";parsed=JSON.parse(salvaged);}
        else throw parseErr;
      }
      if(!parsed.items||!Array.isArray(parsed.items))throw new Error("Invalid response format");
      const validItems=parsed.items.map(ai=>{const catItem=DCAT.find(c=>c.id===ai.defId);if(!catItem)return null;const isRot=ai.rot===true;const effW=isRot?catItem.d:catItem.w;const effD=isRot?catItem.w:catItem.d;
        return{id:uid(),defId:catItem.id,lb:catItem.lb,ic:catItem.ic,cl:catItem.cl,mt:catItem.mt,sh:catItem.sh||0,x:_clamp(ai.x||0,0,gW-effW),y:_clamp(ai.y||0,0,gD-effD),z:ai.z!==undefined?ai.z:(catItem.dZ||0),w:effW,d:effD,h:catItem.h,rot:isRot,note:ai.note||"",locked:false};
      }).filter(Boolean);
      if(validItems.length===0)throw new Error("No valid items generated. Try rephrasing.");
      setPreview({items:validItems,description:parsed.description||"AI-generated layout"});
    }catch(err){console.error("AI error:",err);setError(err.message||"Failed to generate design");}finally{setLoading(false);}
  };
  const applyDesign=mode=>{if(!preview)return;onApplyAI(preview.items,mode);showToast(mode==="replace"?"Design applied!":"Added "+preview.items.length+" items.");setPreview(null);setPrompt("");};
  return(<div style={{padding:14,display:"flex",flexDirection:"column",gap:10}}>
    <div style={{display:"flex",gap:6,alignItems:"center",paddingBottom:10,borderBottom:`1px solid ${DC.bd}`}}><span style={{fontSize:18}}>{"\u2728"}</span><div><div style={{color:DC.gd,fontWeight:700,fontSize:13}}>AI Design Assistant</div><div style={{color:DC.mt,fontSize:10}}>Describe your dream garage</div></div></div>
    <textarea style={{..._iS({fontSize:12,minHeight:80,resize:"vertical",lineHeight:1.5}),fontFamily:"DM Sans,sans-serif"}} placeholder="Example: Home gym with squat rack, mirrors on back wall, slatwall on left, LED lighting, space for one car." value={prompt} onChange={e=>setPrompt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey&&!loading){e.preventDefault();generateDesign();}}}/>
    <button onClick={generateDesign} disabled={loading||!prompt.trim()} style={{..._bS(loading?DC.cd:DC.gd,loading?DC.mt:"#0a0c10"),width:"100%",fontSize:13,padding:"10px 16px",opacity:loading||!prompt.trim()?.6:1}}>{loading?"\u23F3 Designing...":"\u2728 Generate Design"}</button>
    {error&&<div style={{background:DC.rd+"18",border:`1px solid ${DC.rd}44`,borderRadius:8,padding:"8px 12px",color:DC.rd,fontSize:11}}>{error}</div>}
    {preview&&<div style={{background:DC.cd,border:`1px solid ${DC.gd}44`,borderRadius:8,padding:12}}>
      <div style={{color:DC.gd,fontWeight:700,fontSize:12,marginBottom:6}}>{"\u2705"} Design Ready</div>
      <div style={{color:DC.tx,fontSize:11,marginBottom:10,lineHeight:1.4}}>{preview.description}</div>
      <div style={{color:DC.mt,fontSize:10,marginBottom:8}}>{preview.items.length} items:</div>
      <div style={{maxHeight:160,overflowY:"auto",marginBottom:10}}>{preview.items.map((it,i)=>(<div key={i} style={{display:"flex",gap:6,alignItems:"center",padding:"3px 0",fontSize:11,color:DC.tx}}><span>{it.ic}</span><span style={{flex:1}}>{it.lb}{it.rot?" \u21BB":""}</span><span style={{color:DC.mt,fontSize:9}}>({_fmt(it.x)},{_fmt(it.y)})</span></div>))}</div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>applyDesign("replace")} style={{..._bS(DC.gd,"#0a0c10"),flex:1,fontSize:11,padding:"8px 10px"}}>Replace All</button>
        <button onClick={()=>applyDesign("add")} style={{..._bS(DC.gn+"33",DC.gn),flex:1,fontSize:11,padding:"8px 10px",border:`1px solid ${DC.gn}44`}}>Add to Existing</button>
        <button onClick={()=>setPreview(null)} style={{..._bS(DC.cd,DC.mt),fontSize:11,padding:"8px 10px",border:`1px solid ${DC.bd}`}}>{"\u2715"}</button>
      </div>
    </div>}
    <div style={{color:DC.mt,fontSize:9,lineHeight:1.4,marginTop:4}}>Try: "Workshop with workbench and pegboard" or "Home gym with rubber flooring" or "Organized 3-car with two vehicles"</div>
  </div>);
}

/* ── Multi-view Export ──────────────────────────────────────────────────── */
function renderFloorSVG(items,gW,gD,sc){
  const fW=gW*sc,fH=gD*sc;let svg='<svg width="'+fW+'" height="'+fH+'" xmlns="http://www.w3.org/2000/svg"><rect width="'+fW+'" height="'+fH+'" fill="#0a0c10" stroke="#C9A84C" stroke-width="2"/>';
  for(let i=0;i<=gW;i++)svg+='<line x1="'+(i*sc)+'" y1="0" x2="'+(i*sc)+'" y2="'+fH+'" stroke="#1e2535" stroke-width="'+(i%5===0?.8:.3)+'"/>';
  for(let i=0;i<=gD;i++)svg+='<line x1="0" y1="'+(i*sc)+'" x2="'+fW+'" y2="'+(i*sc)+'" stroke="#1e2535" stroke-width="'+(i%5===0?.8:.3)+'"/>';
  items.forEach(it=>{const x=it.x*sc,y=it.y*sc,w=it.w*sc,h=it.d*sc,isA=it.mt==="area";svg+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+it.cl+(isA?"11":"44")+'" stroke="'+it.cl+(isA?"44":"")+'" stroke-width="1" rx="3"/>';svg+='<text x="'+(x+w/2)+'" y="'+(y+h/2+4)+'" text-anchor="middle" fill="'+(isA?it.cl+"88":"#dce6f0")+'" font-size="9" font-weight="600" font-family="sans-serif">'+it.ic+" "+it.lb+"</text>";});
  svg+="</svg>";return svg;
}
function renderWallSVG(wallItems,wW,wH,sc,wallName){
  const fW=wW*sc,fH=wH*sc;let svg='<svg width="'+fW+'" height="'+fH+'" xmlns="http://www.w3.org/2000/svg"><rect width="'+fW+'" height="'+fH+'" fill="#0a0c10" stroke="#64748b" stroke-width="2"/>';
  for(let i=0;i<=wW;i++)svg+='<line x1="'+(i*sc)+'" y1="0" x2="'+(i*sc)+'" y2="'+fH+'" stroke="#1e2535" stroke-width="'+(i%5===0?.8:.3)+'"/>';
  for(let i=0;i<=wH;i++)svg+='<line x1="0" y1="'+(i*sc)+'" x2="'+fW+'" y2="'+(i*sc)+'" stroke="#1e2535" stroke-width="'+(i%5===0?.8:.3)+'"/>';
  svg+='<rect x="0" y="'+(fH-3)+'" width="'+fW+'" height="3" fill="#64748b"/>';
  svg+='<text x="8" y="16" fill="#64748b" font-size="10" font-weight="600" font-family="sans-serif">CEILING '+_fmt(wH)+"</text>";
  svg+='<text x="'+(fW-8)+'" y="16" text-anchor="end" fill="#C9A84C" font-size="11" font-weight="700" font-family="sans-serif">'+wallName+"</text>";
  wallItems.forEach(it=>{const sx=it.x*sc,sy=(wH-it.z-it.h)*sc,sw=it.w*sc,sh=it.h*sc;svg+='<rect x="'+sx+'" y="'+sy+'" width="'+sw+'" height="'+sh+'" fill="'+it.cl+'44" stroke="'+it.cl+'" stroke-width="1" rx="3"/>';svg+='<text x="'+(sx+sw/2)+'" y="'+(sy+sh/2+4)+'" text-anchor="middle" fill="#dce6f0" font-size="9" font-weight="600" font-family="sans-serif">'+it.ic+" "+it.lb+"</text>";});
  svg+="</svg>";return svg;
}
function doExport(items,gW,gD,gH,name,showToast,getWI,getWW){
  const sc=16;const floorSVG=renderFloorSVG(items,gW,gD,sc);
  const walls=["back","front","left","right"];
  const wallSVGs=walls.map(w=>{const wi=getWI(w);if(wi.length===0)return null;const ww=getWW(w);return{name:w.toUpperCase()+" WALL",svg:renderWallSVG(wi,ww,gH,sc,w.toUpperCase()+" WALL"),count:wi.length};}).filter(Boolean);
  const legend=items.map(it=>'<div style="display:inline-flex;gap:6px;align-items:center;font-size:12px;margin:4px 8px 4px 0"><div style="width:10px;height:10px;border-radius:2px;background:'+it.cl+'"></div><span style="color:#dce6f0">'+it.ic+" "+it.lb+'</span><span style="color:#8899aa;font-size:10px">'+_fmt(it.w)+"w "+_fmt(it.d)+"d "+_fmt(it.h)+"h</span>"+(it.note?'<span style="color:#f59e0b;font-size:10px;font-style:italic">'+it.note+"</span>":"")+"</div>").join("");
  const wallSections=wallSVGs.map(ws=>'<h2 style="color:#64748b;font-size:16px;margin:24px 0 8px;font-family:Georgia,serif">'+ws.name+' <span style="color:#8899aa;font-size:12px;font-weight:400">('+ws.count+' items)</span></h2><div class="plan">'+ws.svg+"</div>").join("");
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>'+name+' - The Fifth Room</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0a0c10;color:#dce6f0;padding:32px;max-width:1100px;margin:0 auto}h1{color:#C9A84C;font-size:24px;margin-bottom:4px;font-family:Georgia,serif}h2{color:#64748b}.sub{color:#8899aa;font-size:13px;margin-bottom:24px}.plan{overflow:auto;background:#12151d;border:1px solid #1e2535;border-radius:10px;padding:20px;display:inline-block;margin-bottom:12px}.legend{display:flex;flex-wrap:wrap;margin-bottom:24px}.footer{padding:20px;background:#12151d;border-radius:10px;font-size:12px;color:#8899aa;margin-top:24px}.cta{display:inline-block;background:#C9A84C;color:#0a0c10;padding:12px 28px;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;margin-top:16px}</style></head><body><h1>\uD83C\uDFE0 '+name+'</h1><p class="sub">'+gW+"'x"+gD+"' garage \u00B7 "+gH+"' ceiling \u00B7 "+items.length+' items</p><h2 style="color:#C9A84C;font-size:16px;margin:0 0 8px;font-family:Georgia,serif">FLOOR PLAN</h2><div class="plan">'+floorSVG+"</div>"+wallSections+'<div class="legend" style="margin-top:16px">'+legend+'</div><div class="footer"><p><strong style="color:#C9A84C">The Fifth Room</strong> \u2014 Premium Garage Transformations \u2014 Northern Utah</p><p style="margin-top:6px">\uD83D\uDCDE (801) 928-4790 \u00B7 thefifthroomutah@gmail.com</p><p style="margin-top:12px;color:#dce6f0">Love this layout? Let\u2019s make it real.</p><a href="tel:8019284790" class="cta">Call for Free Estimate</a></div></body></html>';
  try{const blob=new Blob([html],{type:"text/html;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=(name.replace(/\s+/g,"_")||"design")+".html";document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),5000);showToast("Exported floor + "+wallSVGs.length+" wall views!");}catch(err){showToast("Export failed: "+err.message);}
}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
              <div>
                <div style={{color:DC.gd,fontWeight:800,fontSize:20,fontFamily:"Playfair Display,serif"}}>Send My Design</div>
                <div style={{color:DC.mt,fontSize:12,marginTop:4}}>{items.length} items {"\u00B7"} {gW}' x {gD}' garage</div>
              </div>
              <button onClick={()=>setShowSend(false)} style={{..._bS("transparent",DC.mt),padding:"4px 10px",fontSize:20}}>{"\u00D7"}</button>
            </div>
            {/* Design preview */}
            <div style={{background:DC.bg,border:`1px solid ${DC.bd}`,borderRadius:10,padding:12,marginBottom:16,maxHeight:120,overflowY:"auto"}}>
              {items.map((it,i)=>(<div key={i} style={{display:"flex",gap:6,alignItems:"center",padding:"3px 0",fontSize:12,color:DC.tx}}><span>{it.ic}</span><span style={{flex:1}}>{it.lb}</span><span style={{color:DC.mt,fontSize:10}}>{_fmt(it.w)} x {_fmt(it.d)}</span></div>))}
              {items.length===0&&<div style={{color:DC.mt,fontSize:12,textAlign:"center",padding:8}}>Add items to your design first</div>}
            </div>

      {/* Header */}
      <div style={{background:DC.sf,borderBottom:`1px solid ${DC.bd}`,padding:"8px 10px",flexShrink:0}}>
        <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
          <a href="/" style={{color:DC.gd,fontWeight:800,fontSize:14,fontFamily:"Playfair Display,serif",textDecoration:"none",flexShrink:0}}>The Fifth Room</a>
          <input style={_iS({flex:1,fontSize:12,padding:"5px 8px"})} value={dn} onChange={e=>sDN(e.target.value)}/>
          <button onClick={()=>setMobMenu(mobMenu==="menu"?null:"menu")} style={{..._bS(DC.cd,DC.mt),padding:"6px 10px",fontSize:16,minHeight:40,border:`1px solid ${DC.bd}`}}>{"\u22EF"}</button>
        </div>
        <div style={{display:"flex",gap:3,overflowX:"auto",scrollbarWidth:"none",paddingBottom:2}}>
          {viewTabs.map(v=>(<button key={v.id} onClick={()=>{sVM(v.id);setMobMenu(null);}} style={{..._bS(vm===v.id?v.c+"33":"transparent",vm===v.id?v.c:DC.mt),padding:"5px 10px",fontSize:11,flexShrink:0,minHeight:36,borderBottom:vm===v.id?`2px solid ${v.c}`:"2px solid transparent",borderRadius:"6px 6px 0 0"}}>
            {v.lb}{v.id.startsWith("w-")&&(()=>{const n=getWI(v.id.slice(2)).length;return n>0?<span style={{marginLeft:3,background:v.c+"44",padding:"0 4px",borderRadius:8,fontSize:9}}>{n}</span>:null;})()}
          </button>))}
          <div style={{display:"flex",gap:2,marginLeft:"auto",flexShrink:0}}>
            {[14,18,22,28].map(s=>(<button key={s} onClick={()=>sSC(s)} style={{..._bS(sc===s?DC.gd+"33":DC.cd,sc===s?DC.gd:DC.mt),padding:"4px 7px",fontSize:10,minHeight:36}}>{s===14?"\u2212":s===18?"S":s===22?"M":"+"}</button>))}
          </div>
        </div>
      </div>

      {/* Menu dropdown */}
      {mobMenu==="menu"&&<div style={{position:"absolute",top:90,right:8,zIndex:200,background:DC.sf,border:`1px solid ${DC.bd}`,borderRadius:10,padding:12,boxShadow:"0 8px 32px #0008",width:260}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
          <div><div style={{color:DC.mt,fontSize:9,marginBottom:3}}>Width</div><_FI value={gW} onChange={v=>sGW(Math.max(4,v))}/></div>
          <div><div style={{color:DC.mt,fontSize:9,marginBottom:3}}>Depth</div><_FI value={gD} onChange={v=>sGD(Math.max(4,v))}/></div>
          <div><div style={{color:DC.mt,fontSize:9,marginBottom:3}}>Height</div><_FI value={gH} onChange={v=>sGH(Math.max(6,v))}/></div>
          <div style={{display:"flex",alignItems:"flex-end"}}><span style={{color:DC.mt,fontSize:10,paddingBottom:4}}>{Math.round(gW*gD)} sqft</span></div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          <button onClick={()=>{doExport(items,gW,gD,gH,dn,showToast,getWI,getWW);setMobMenu(null);}} style={{..._bS(DC.gd,"#0a0c10"),flex:1,padding:"10px 0",fontSize:12,fontWeight:700,minHeight:44}}>{"\u2B07"} Export</button>
          <button onClick={()=>{setShowSend(true);setMobMenu(null);}} style={{..._bS(DC.gn,DC.bg),flex:1,padding:"10px 0",fontSize:12,fontWeight:700,minHeight:44}}>{"\uD83D\uDCE8"} Send Design</button>
        </div>
      </div>}

      {/* Canvas */}
      <div style={{flex:1,overflow:"auto",touchAction:"pan-x pan-y",WebkitOverflowScrolling:"touch",background:"#080a0f",padding:8}}>
        <div style={{display:"inline-block",minWidth:"100%"}}>
          {vm==="floor"&&<FloorCV items={items} gW={gW} gD={gD} sc={sc} sel={sel} onSel={hSel} onDrag={hFDrag} onTap={hTap}/>}
          {vm==="iso"&&<IsoCV items={items} gW={gW} gD={gD} gH={gH} sc={sc} sel={sel} onSel={hSel}/>}
          {cw&&<WallCV items={getWI(cw)} wW={getWW(cw)} wH={gH} sc={sc} sel={sel} onSel={hSel} onDrag={hWDrag(cw)} nm={cw.toUpperCase()+" WALL"} onTap={hTap}/>}
        </div>
        {items.length>0&&<div style={{display:"flex",gap:4,overflowX:"auto",marginTop:8,paddingBottom:4,scrollbarWidth:"none"}}>
          {items.filter(i=>i.mt!=="area").map(it=>(<button key={it.id} onClick={()=>hSel(it.id)} style={{..._bS(sel===it.id?it.cl+"33":DC.cd,sel===it.id?it.cl:DC.mt),padding:"5px 10px",fontSize:11,flexShrink:0,border:`1px solid ${sel===it.id?it.cl:it.cl+"33"}`,minHeight:36,display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:13}}>{it.ic}</span><span>{it.lb}</span></button>))}
        </div>}
      </div>

      {/* Bottom toolbar */}
      <div style={{background:DC.sf,borderTop:`1px solid ${DC.bd}`,padding:"8px 10px",flexShrink:0,display:"flex",gap:6}}>
        <button onClick={()=>setMobMenu(mobMenu==="palette"?null:"palette")} style={{..._bS(mobMenu==="palette"?DC.gd+"33":DC.cd,mobMenu==="palette"?DC.gd:DC.tx),flex:1,padding:"10px 0",fontSize:13,fontWeight:700,minHeight:46,border:`1px solid ${DC.bd}`}}>
          {mobMenu==="palette"?"\u2715 Close":"\uFF0B Add"}
        </button>
        <button onClick={()=>setMobMenu(mobMenu==="ai"?null:"ai")} style={{..._bS(mobMenu==="ai"?DC.pr+"33":DC.cd,mobMenu==="ai"?DC.pr:DC.tx),flex:1,padding:"10px 0",fontSize:13,fontWeight:700,minHeight:46,border:`1px solid ${DC.bd}`}}>
          {mobMenu==="ai"?"\u2715":"\u2728 AI"}
        </button>
        <button onClick={()=>setShowSend(true)} style={{..._bS(DC.gn,DC.bg),flex:1,padding:"10px 0",fontSize:12,fontWeight:800,minHeight:46,borderRadius:10}}>
          {"\uD83D\uDCE8"} Send
        </button>
      </div>

      {/* Bottom sheets */}
      {(mobMenu==="palette"||mobMenu==="inspector"||mobMenu==="ai")&&<div style={{position:"absolute",inset:0,background:"#0005",zIndex:199}} onClick={()=>setMobMenu(null)}/>}

      {mobMenu==="palette"&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:DC.sf,borderTop:`2px solid ${DC.gd}`,borderRadius:"16px 16px 0 0",padding:"16px 12px 90px",zIndex:200,maxHeight:"55vh",overflowY:"auto",boxShadow:"0 -8px 32px #0008"}}>
        <div style={{width:40,height:4,background:DC.bd,borderRadius:2,margin:"0 auto 12px"}}/>
        <div style={{color:DC.tx,fontWeight:700,fontSize:14,marginBottom:10}}>Add Item</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
          {DCATS.map(cat=>(<button key={cat} onClick={()=>sCF(cat)} style={{..._bS(cf===cat?DC.gd+"33":DC.cd,cf===cat?DC.gd:DC.mt),padding:"5px 12px",fontSize:12,minHeight:36,border:`1px solid ${cf===cat?DC.gd+"44":DC.bd}`}}>{cat}</button>))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:5}}>
          {DCAT.filter(d=>d.ct===cf).map(def=>(<button key={def.id} onClick={()=>{addItem(def);setMobMenu(null);}} style={{..._bS(DC.cd,DC.tx),padding:"9px 10px",fontSize:12,border:`1px solid ${def.cl}33`,display:"flex",gap:6,alignItems:"center",textAlign:"left",minHeight:44}}>
            <span style={{fontSize:16}}>{def.ic}</span><div style={{flex:1}}><div style={{fontWeight:500}}>{def.lb}</div><div style={{fontSize:9,color:DC.mt}}>{def.w}'w {def.d}'d</div></div>
          </button>))}
        </div>
      </div>}

      {mobMenu==="inspector"&&selIt&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:DC.sf,borderTop:`2px solid ${selIt.cl}`,borderRadius:"16px 16px 0 0",padding:"16px 14px 90px",zIndex:200,maxHeight:"60vh",overflowY:"auto",boxShadow:"0 -8px 32px #0008"}}>
        <div style={{width:40,height:4,background:DC.bd,borderRadius:2,margin:"0 auto 12px"}}/>
        <Insp item={selIt} onUpd={ch=>upIt(selIt.id,ch)} onDel={()=>{delIt(selIt.id);setMobMenu(null);}} onClose={()=>{setMobMenu(null);sSel(null);sSI(false);}} onRotate={()=>rotateItem(selIt.id)}/>
      </div>}

      {mobMenu==="ai"&&<div style={{position:"absolute",bottom:0,left:0,right:0,background:DC.sf,borderTop:`2px solid ${DC.pr}`,borderRadius:"16px 16px 0 0",padding:"16px 14px 90px",zIndex:200,maxHeight:"70vh",overflowY:"auto",boxShadow:"0 -8px 32px #0008"}}>
        <div style={{width:40,height:4,background:DC.bd,borderRadius:2,margin:"0 auto 12px"}}/>
        <AIPanel gW={gW} gD={gD} gH={gH} items={items} onApplyAI={(ai,mode)=>{handleApplyAI(ai,mode);setMobMenu(null);}} showToast={showToast}/>
      </div>}
    </div>
  );

  // ── DESKTOP LAYOUT ──────────────────────────────────────────────────────────
  return(<div style={{fontFamily:"DM Sans,sans-serif",background:DC.bg,color:DC.tx,minHeight:"100vh"}}>
    <style>{`*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;padding:0}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:${DC.bg}}::-webkit-scrollbar-thumb{background:${DC.bd};border-radius:3px}button{transition:opacity .12s;cursor:pointer}button:active{opacity:.7}input:focus,select:focus,textarea:focus{outline:2px solid ${DC.gd}44!important}select option{background:${DC.cd};color:${DC.tx}}`}</style>
    {toast&&<div style={{position:"fixed",bottom:80,right:20,zIndex:9999,background:DC.cd,border:`1px solid ${DC.bd}`,color:DC.tx,padding:"10px 18px",borderRadius:10,fontSize:13,boxShadow:"0 4px 20px #0008"}}>{toast}</div>}
    {showSend&&<SendModal/>}

    {/* Header */}
    <div style={{background:DC.sf,borderBottom:`1px solid ${DC.bd}`,padding:"12px 24px",display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
      <a href="/" style={{textDecoration:"none",flexShrink:0}}>
        <div style={{color:DC.gd,fontWeight:800,fontSize:20,fontFamily:"Playfair Display,serif"}}>The Fifth Room</div>
        <div style={{color:DC.mt,fontSize:10}}>Garage Designer</div>
      </a>
      <input style={_iS({maxWidth:220,fontSize:14})} value={dn} onChange={e=>sDN(e.target.value)}/>
      <div style={{flex:1}}/>
      <div style={{display:"flex",gap:8,alignItems:"center",background:DC.cd,padding:"6px 12px",borderRadius:8}}>
        <span style={{color:DC.mt,fontSize:10,fontWeight:700}}>GARAGE:</span>
        <_FI label="W" value={gW} onChange={v=>sGW(Math.max(4,v))}/><span style={{color:DC.mt}}>{"\u00D7"}</span>
        <_FI label="D" value={gD} onChange={v=>sGD(Math.max(4,v))}/><span style={{color:DC.mt}}>{"\u00D7"}</span>
        <_FI label="H" value={gH} onChange={v=>sGH(Math.max(6,v))}/>
      </div>
      <button onClick={()=>setShowAI(a=>!a)} style={{..._bS(showAI?DC.gd+"33":DC.pr+"33",showAI?DC.gd:DC.pr),padding:"8px 16px",fontSize:12,fontWeight:700,border:`1px solid ${showAI?DC.gd+"66":DC.pr+"44"}`}}>{"\u2728"} AI</button>
      <button onClick={()=>doExport(items,gW,gD,gH,dn,showToast,getWI,getWW)} style={{..._bS(DC.cd,DC.mt),padding:"8px 14px",fontSize:12,border:`1px solid ${DC.bd}`}}>{"\u2B07"} Export</button>
      <button onClick={()=>setShowSend(true)} style={{..._bS(DC.gn,DC.bg),padding:"10px 24px",fontSize:14,fontWeight:800,borderRadius:10,letterSpacing:.3}}>{"\uD83D\uDCE8"} Send My Design</button>
    </div>

    {/* View Tabs */}
    <div style={{background:DC.sf,borderBottom:`1px solid ${DC.bd}`,padding:"6px 24px",display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
      {viewTabs.map(v=>(<button key={v.id} onClick={()=>sVM(v.id)} style={{..._bS(vm===v.id?v.c+"33":"transparent",vm===v.id?v.c:DC.mt),padding:"6px 14px",fontSize:12,borderBottom:vm===v.id?`2px solid ${v.c}`:"2px solid transparent",borderRadius:"6px 6px 0 0"}}>
        {v.lb}{v.id.startsWith("w-")&&(()=>{const n=getWI(v.id.slice(2)).length;return n>0?<span style={{marginLeft:4,background:v.c+"44",padding:"0 5px",borderRadius:8,fontSize:10}}>{n}</span>:null;})()}
      </button>))}
      <div style={{flex:1}}/>
      <div style={{display:"flex",gap:3}}>{[14,18,22,28,36].map(s=>(<button key={s} onClick={()=>sSC(s)} style={{..._bS(sc===s?DC.gd+"33":DC.cd,sc===s?DC.gd:DC.mt),padding:"4px 8px",fontSize:11}}>{s===14?"XS":s===18?"S":s===22?"M":s===28?"L":"XL"}</button>))}</div>
      <div style={{fontSize:11,color:DC.mt,marginLeft:8}}><span style={{color:DC.gn,fontWeight:700}}>{items.length}</span> items</div>
    </div>

    {/* Main */}
    <div style={{display:"flex",minHeight:"calc(100vh - 130px)"}}>
      <div style={{width:showAI?280:200,flexShrink:0,background:DC.sf,borderRight:`1px solid ${DC.bd}`,overflowY:"auto",transition:"width 0.2s"}}>
        {showAI?<AIPanel gW={gW} gD={gD} gH={gH} items={items} onApplyAI={handleApplyAI} showToast={showToast}/>:(
          <div style={{padding:"12px 10px"}}>
            <div style={{color:DC.mt,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Items ({DCAT.length})</div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:10}}>{DCATS.map(cat=>(<button key={cat} onClick={()=>sCF(cat)} style={{..._bS(cf===cat?DC.gd+"33":DC.cd,cf===cat?DC.gd:DC.mt),padding:"3px 7px",fontSize:9,border:`1px solid ${cf===cat?DC.gd+"44":DC.bd}`}}>{cat}</button>))}</div>
            <div style={{display:"flex",flexDirection:"column",gap:3}}>{DCAT.filter(d=>d.ct===cf).map(def=>(
              <button key={def.id} onClick={()=>addItem(def)} style={{..._bS(DC.cd,DC.tx),padding:"5px 7px",fontSize:11,textAlign:"left",border:`1px solid ${def.cl}33`,display:"flex",gap:5,alignItems:"center"}}>
                <span style={{fontSize:13}}>{def.ic}</span><div style={{flex:1}}><div style={{fontWeight:500,fontSize:11}}>{def.lb}</div><div style={{fontSize:8,color:DC.mt}}>{def.w}'w {def.d}'d {def.h}'h <span style={{color:MOUNTS[def.mt]?.c}}>{def.mt}</span></div></div>
              </button>))}</div>
          </div>
        )}
      </div>

      <div style={{flex:1,overflow:"auto",padding:20,background:"#080a0f",display:"flex",justifyContent:"center",alignItems:"flex-start"}}>
        {vm==="floor"&&<FloorCV items={items} gW={gW} gD={gD} sc={sc} sel={sel} onSel={hSel} onDrag={hFDrag} onTap={hTap}/>}
        {vm==="iso"&&<IsoCV items={items} gW={gW} gD={gD} gH={gH} sc={sc} sel={sel} onSel={hSel}/>}
        {cw&&<WallCV items={getWI(cw)} wW={getWW(cw)} wH={gH} sc={sc} sel={sel} onSel={hSel} onDrag={hWDrag(cw)} nm={cw.toUpperCase()+" WALL"} onTap={hTap}/>}
      </div>

      {si&&(<div style={{width:250,flexShrink:0,background:DC.sf,borderLeft:`1px solid ${DC.bd}`,overflowY:"auto"}}>
        <div style={{padding:"10px 14px",borderBottom:`1px solid ${DC.bd}`}}><span style={{color:DC.mt,fontSize:11,fontWeight:700}}>INSPECTOR</span></div>
        <Insp item={selIt} onUpd={ch=>selIt&&upIt(selIt.id,ch)} onDel={()=>selIt&&delIt(selIt.id)} onClose={()=>{sSI(false);sSel(null);}} onRotate={()=>selIt&&rotateItem(selIt.id)}/>
      </div>)}
    </div>

    {/* Footer */}
    <div style={{background:DC.sf,borderTop:`1px solid ${DC.bd}`,padding:"10px 24px",display:"flex",gap:16,alignItems:"center",fontSize:11,color:DC.mt}}>
      <span>Click to select {"\u00B7"} <span style={{color:DC.pr}}>R</span> rotate {"\u00B7"} Drag to move {"\u00B7"} Esc deselect</span>
      <div style={{flex:1}}/>
      <span>{gW}' x {gD}' {"\u00B7"} {items.length} items</span>
      <a href="tel:8019284790" style={{color:DC.gd,textDecoration:"none",fontWeight:700}}>(801) 928-4790</a>
      <a href="/" style={{color:DC.gd,textDecoration:"none",fontWeight:600}}>thefifthroomutah.com</a>
    </div>
  </div>);
}

    // ── Mount ──
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
